<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUT Street View Adventure - Vote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --sut-orange: #FF8C00;
            --sut-gold: #FFD700;
            --adventure-green: #4CAF50;
            --soft-bg: #FFFDF0;
            --text-dark: #2D3436;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--soft-bg);
            font-family: 'Mitr', sans-serif;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 650px;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border-top: 10px solid var(--sut-orange);
            margin: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--sut-orange);
            font-family: 'Comfortaa', cursive;
            margin: 10px 0;
            font-size: 32px;
        }

        .badge {
            background: var(--adventure-green);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            font-weight: 500;
        }

        .description {
            color: #666;
            font-size: 15px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group {
            background: #fdfcf7;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #f1ebd9;
            margin-bottom: 20px;
        }

        .form-group h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--sut-orange);
            font-size: 18px;
            border-bottom: 2px solid #f1ebd9;
            padding-bottom: 8px;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .score-row:last-child {
            margin-bottom: 0;
        }

        .team-label {
            font-weight: 500;
            font-size: 16px;
        }

        .score-buttons {
            display: flex;
            gap: 6px;
        }

        .score-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Mitr', sans-serif;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .score-btn:hover {
            border-color: var(--sut-orange);
            color: var(--sut-orange);
        }

        .score-btn.active {
            background: var(--sut-orange);
            border-color: var(--sut-orange);
            color: white;
            box-shadow: 0 4px 10px rgba(255,140,0,0.2);
        }

        .submit-btn {

            padding: 16px;
            background: var(--adventure-green);
            color: white;
            border: none;
